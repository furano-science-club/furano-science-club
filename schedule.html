<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年間予定カレンダー - 富良野高校科学部</title>
    <style>
        /* --- デザインシステム（変数の定義） --- */
        :root {
            --bg-base: #f8fafc;       /* ミニマルなライトグレー（背景） */
            --bg-card: #ffffff;       /* カード背景（純白） */
            --border-color: #e2e8f0;  /* 境界線 */
            --primary: #475569;       /* メイン（洗練されたスレートグレー） */
            --accent-blue: #3b82f6;   /* フィールドワーク系イベントの色 */
            --accent-purple: #a855f7; /* 大会・発表会系の色 */
            --text-main: #0f172a;     /* メインテキスト */
            --text-sub: #64748b;      /* サブテキスト */
            --font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        /* --- リセット＆基本スタイル --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
        }
        a {
            color: inherit;
            text-decoration: none;
        }

        /* --- ヘッダー（構造共通・ミニマルライト版） --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }
        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #0f172a;
        }
        .logo span {
            color: var(--text-sub);
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }
        nav a {
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
            position: relative;
            padding: 5px 0;
            color: var(--text-sub);
        }
        nav a:hover, nav a.active {
            color: var(--text-main);
        }
        nav a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--text-main);
        }

        /* --- ページヘッダー --- */
        .page-header {
            padding: 160px 20px 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background-color: #ffffff;
        }
        .page-header h1 {
            font-size: 2.4rem;
            letter-spacing: 4px;
            color: var(--text-main);
            margin-bottom: 10px;
            font-weight: 600;
        }
        .page-header p {
            font-size: 0.9rem;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        /* --- コンテナ --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px 100px;
        }

        /* --- スケジュールリスト --- */
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .schedule-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 25px 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }
        .schedule-item:hover {
            transform: translateX(4px);
        }

        /* 月を表示するエリア */
        .month-badge {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            width: 80px;
            border-right: 2px solid var(--border-color);
            margin-right: 30px;
            font-family: monospace;
        }
        .month-badge span {
            font-size: 0.9rem;
            font-weight: normal;
            display: block;
            color: var(--text-sub);
        }
