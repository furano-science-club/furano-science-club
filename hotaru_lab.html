<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ほたる研究室 - 富良野高校科学部</title>
    <style>
        /* --- デザインシステム（変数の定義） --- */
        :root {
            --bg-biotech: #12161a;    /* 墨色（チャコールブラック） */
            --bg-box: #1a2026;         /* ボックス背景 */
            --primary: #39ff14;       /* ネオングリーン（蛍の発光色） */
            --border-neon: rgba(57, 255, 20, 0.2);
            --text-main: #e2e8f0;     /* メインテキスト */
            --text-sub: #94a3b8;      /* サブテキスト */
            --font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        /* --- リセット＆基本スタイル --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--bg-biotech);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
        }
        a {
            color: inherit;
            text-decoration: none;
        }

        /* --- ヘッダー（構造共通・ほたる用サイバー和モダン版） --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(18, 22, 26, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-neon);
        }
        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .logo span {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.6);
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }
        nav a {
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            padding: 5px 0;
            color: var(--text-sub);
        }
        nav a:hover, nav a.active {
            color: var(--primary);
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.6);
        }
        nav a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary);
            box-shadow: 0 0 12px var(--primary);
        }

        .page-header
